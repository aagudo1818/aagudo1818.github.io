<button id="reset">Reiniciar progreso</button>

<script>
const STORAGE_KEY = "mallorca_municipios_checklist_v1";
const checkboxes = document.querySelectorAll('input[type="checkbox"]');

function updateStats() {
  const checked = [...checkboxes].filter(cb => cb.checked).length;
  document.getElementById("stats").textContent =
    `${checked}/53 completados (${Math.round(checked/53*100)}%)`;
  document.getElementById("progress").value = checked;
}

function save() {
  const data = [...checkboxes].map(cb => ({
    name: cb.dataset.name,
    checked: cb.checked
  }));
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  updateStats();
}

function load() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (!saved) return updateStats();

  const data = JSON.parse(saved);
  data.forEach(item => {
    const cb = document.querySelector(`input[data-name="${CSS.escape(item.name)}"]`);
    if (cb) cb.checked = item.checked;
  });
  updateStats();
}

checkboxes.forEach(cb => cb.addEventListener("change", save));

document.getElementById("reset").addEventListener("click", () => {
  if (confirm("¿Seguro que quieres borrar todo el progreso?")) {
    localStorage.removeItem(STORAGE_KEY);
    checkboxes.forEach(cb => cb.checked = false);
    updateStats();
  }
});

load();
</script>
