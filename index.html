<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mallorca Explorer PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
  'https://imizmphocsliukbqvsxe.supabase.co',
  'sb_publishable_kpZt-um8CiK_Wmaxx22-5g_6EwhTRjs'
);

let data = [];
let filter = "all";
let map;
let markers = [];

/* ---------------- MAP ---------------- */
function initMap() {
  map = L.map('map').setView([39.6, 2.9], 9);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);
}

/* ---------------- COORDS (53 municipios) ---------------- */
function getCoords() {
  return {
    "Palma":[39.5696,2.6502],
    "Sóller":[39.7654,2.7140],
    "Alcúdia":[39.8420,3.1249],
    "Pollença":[39.8770,3.0163],
    "Inca":[39.7189,2.9156],
    "Manacor":[39.5699,3.2096],
    "Calvià":[39.5655,2.5040],
    "Andratx":[39.5753,2.4201],
    "Santanyí":[39.3555,3.1299],
    "Artà":[39.6926,3.3497],
    "Capdepera":[39.7031,3.4348],
    "Felanitx":[39.4687,3.1485],
    "Llucmajor":[39.4850,2.8940],
    "Muro":[39.7356,3.0551],
    "Sa Pobla":[39.7693,3.0236],
    "Sineu":[39.6429,3.0106],
    "Alaró":[39.7069,2.7919],
    "Algaida":[39.5607,2.8952],
    "Binissalem":[39.6887,2.8439],
    "Bunyola":[39.6883,2.6993],
    "Campanet":[39.7753,2.9666],
    "Campos":[39.4301,3.0213],
    "Deià":[39.7485,2.6499],
    "Esporles":[39.6670,2.5785],
    "Estellencs":[39.6532,2.4815],
    "Fornalutx":[39.7825,2.7402],
    "Lloseta":[39.7173,2.8645],
    "Llubí":[39.7015,3.0055],
    "Mancor de la Vall":[39.7503,2.8716],
    "Maria de la Salut":[39.6644,3.0731],
    "Montuïri":[39.5687,2.9844],
    "Petra":[39.6136,3.1126],
    "Porreres":[39.5144,3.0224],
    "Selva":[39.7564,2.8980],
    "Sencelles":[39.6456,2.9035],
    "Ses Salines":[39.3386,3.0528],
    "Valldemossa":[39.7119,2.6222],
    "Vilafranca de Bonany":[39.5683,3.0884]
  };
}

/* ---------------- NORMALIZE RESTAURANTS ---------------- */
function normalizeRestaurants(rest) {
  if (!Array.isArray(rest)) return [];

  return rest.map(r => {
    if (typeof r === "string") {
      return { nombre: r, rating: null, veg: false };
    }
    return r;
  });
}

/* ---------------- LOAD ---------------- */
async function load() {
  const status = document.getElementById("status");

  try {
    const { data: res } = await supabase.from('municipios_info').select('*');
    const { data: checklist } = await supabase.from('checklist_mallorca').select('*');

    const visitedMap = new Map();
    (checklist || []).forEach(x => visitedMap.set(x.municipio, x.visitado));

    data = (res || [])
      .map(m => ({
        ...m,
        visitado: visitedMap.get(m.municipio) || false
      }))
      .sort((a,b)=> a.municipio.localeCompare(b.municipio));

    renderMap();
    render();

    status.textContent = "Connected ✓";

  } catch (err) {
    status.textContent = err.message;
  }
}

/* ---------------- MAP ---------------- */
function renderMap() {
  if (!map) initMap();

  const coords = getCoords();

  markers.forEach(m => map.removeLayer(m));
  markers = [];

  data.forEach(m => {
    const c = coords[m.municipio];
    if (!c) return;

    const marker = L.marker(c).addTo(map);

    marker.bindPopup(`
      <b>${m.municipio}</b><br/>
      <button onclick="window.focusMunicipio('${m.municipio}')">
        Ver municipio
      </button>
    `);

    markers.push(marker);
  });
}

/* ---------------- FILTER ---------------- */
function getFiltered() {
  if (filter === "visited") return data.filter(x => x.visitado);
  if (filter === "pending") return data.filter(x => !x.visitado);
  return data;
}

/* ---------------- RENDER ---------------- */
function render() {
  const container = document.getElementById("municipios");
  container.innerHTML = "";

  const rows = getFiltered();

  rows.forEach(item => {

    const lugares = Array.isArray(item.lugares) ? item.lugares : [];
    const restaurantes = normalizeRestaurants(item.restaurantes);
    const veg = restaurantes.filter(r => r.veg === true);

    const div = document.createElement("div");
    div.className = "card-item";

    div.innerHTML = `
      <div class="title">
        <input type="checkbox"
          ${item.visitado ? "checked" : ""}
          onchange="toggle(\`${item.municipio}\`, this.checked)"
        />
        ${item.municipio}
      </div>

      <div class="desc">${item.descripcion || ""}</div>

      <div class="section">
        <h4>📍 Lugares</h4>
        ${
          lugares.length
            ? lugares.map(l => `
                <div class="badge">
                  📌 ${l?.nombre || l} — ${l?.descripcion || ""}
                </div>
              `).join("")
            : "Sin datos"
        }
      </div>

      <div class="section">
        <h4>🍽️ Restaurantes</h4>
        ${
          restaurantes.length
            ? restaurantes.map(r => `
                <div class="badge">
                  🍴 ${r.nombre} ⭐ ${r.rating ?? "-"}
                </div>
              `).join("")
            : "Sin datos"
        }
      </div>

      <div class="section">
        <h4>🌱 Vegetarianos</h4>
        ${
          veg.length
            ? veg.map(v => `
                <div class="badge veg">
                  🥗 ${v.nombre} ⭐ ${v.rating ?? "-"}
                </div>
              `).join("")
            : "No hay opciones vegetarianas"
        }
      </div>
    `;

    container.appendChild(div);
  });

  updateCounter();
}

/* ---------------- COUNTER ---------------- */
function updateCounter() {
  const done = data.filter(x => x.visitado).length;

  document.getElementById("counter").textContent =
    `${done}/${data.length} municipios visitados`;

  document.getElementById("progress").max = data.length || 1;
  document.getElementById("progress").value = done;
}

/* ---------------- TOGGLE ---------------- */
window.toggle = async function(municipio, value){
  await supabase
    .from('checklist_mallorca')
    .update({ visitado: value })
    .eq('municipio', municipio);

  load();
};

/* ---------------- MAP CLICK ---------------- */
window.focusMunicipio = function(name){
  alert("📍 " + name);
};

/* ---------------- FILTER ---------------- */
window.setFilter = (f) => {
  filter = f;
  render();
};

window.addEventListener("DOMContentLoaded", async () => {
  initMap();
  await load();
});
</script>

<style>
body{
  margin:0;
  font-family: system-ui;
  background: linear-gradient(135deg,#eef2f7,#dfe9f3);
  padding:20px;
}

.card{
  max-width:1100px;
  margin:auto;
  background:#fff;
  border-radius:18px;
  padding:20px;
  box-shadow:0 12px 30px rgba(0,0,0,.08);
}

#map{
  height:320px;
  border-radius:12px;
  margin:15px 0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:15px;
}

.card-item{
  border:1px solid #eee;
  padding:15px;
  border-radius:14px;
  background:white;
}

.title{
  font-weight:700;
  display:flex;
  gap:10px;
}

.badge{
  display:block;
  padding:6px;
  margin:4px 0;
  background:#f3f6ff;
  border-radius:10px;
  font-size:12px;
}

.veg{ background:#e7ffe7; }

.section{ margin-top:10px; }

.desc{ font-size:13px; opacity:.8; }

</style>
</head>

<body>

<div class="card">
  <h1>🏝️ Mallorca Explorer PRO</h1>

  <div id="counter"></div>
  <progress id="progress" max="53" value="0"></progress>

  <div id="map"></div>

  <div id="municipios" class="grid"></div>
  <div id="status">Loading...</div>
</div>

</body>
</html>
