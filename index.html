<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mallorca Explorer PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
  'https://imizmphocsliukbqvsxe.supabase.co',
  'sb_publishable_kpZt-um8CiK_Wmaxx22-5g_6EwhTRjs'
);

let data = [];
let map;
let markers = {};
let activeMunicipio = null;

function initMap() {
  map = L.map('map').setView([39.6, 2.9], 9);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);
}

/* ✅ TODOS los municipios */
function getCoords() {
  return {
    "Palma":[39.5696,2.6502],
    "Sóller":[39.7654,2.7140],
    "Alcúdia":[39.8420,3.1249],
    "Pollença":[39.8770,3.0163],
    "Inca":[39.7189,2.9156],
    "Manacor":[39.5699,3.2096],
    "Calvià":[39.5655,2.5040],
    "Andratx":[39.5753,2.4201],
    "Santanyí":[39.3555,3.1299],
    "Artà":[39.6926,3.3497],
    "Capdepera":[39.7031,3.4348],
    "Felanitx":[39.4687,3.1485],
    "Llucmajor":[39.4850,2.8940],
    "Muro":[39.7356,3.0551],
    "Sa Pobla":[39.7693,3.0236],
    "Sineu":[39.6429,3.0106],
    "Alaró":[39.7069,2.7919],
    "Algaida":[39.5607,2.8952],
    "Binissalem":[39.6887,2.8439],
    "Bunyola":[39.6883,2.6993],
    "Campanet":[39.7753,2.9666],
    "Campos":[39.4301,3.0213],
    "Deià":[39.7485,2.6499],
    "Esporles":[39.6670,2.5785],
    "Estellencs":[39.6532,2.4815],
    "Fornalutx":[39.7825,2.7402],
    "Lloseta":[39.7173,2.8645],
    "Llubí":[39.7015,3.0055],
    "Mancor de la Vall":[39.7503,2.8716],
    "Maria de la Salut":[39.6644,3.0731],
    "Montuïri":[39.5687,2.9844],
    "Petra":[39.6136,3.1126],
    "Porreres":[39.5144,3.0224],
    "Selva":[39.7564,2.8980],
    "Sencelles":[39.6456,2.9035],
    "Ses Salines":[39.3386,3.0528],
    "Valldemossa":[39.7119,2.6222],
    "Vilafranca de Bonany":[39.5683,3.0884],
    "Puigpunyent":[39.6247,2.5277],
    "Santa Maria del Camí":[39.6460,2.7740],
    "Lloret de Vistalegre":[39.6160,3.0050],
    "Consell":[39.6680,2.8120],
    "Santa Eugènia":[39.6230,2.8410],
    "Costitx":[39.6560,2.9490],
    "Santa Margalida":[39.7020,3.1010],
    "Ariany":[39.6510,3.1100],
    "Sant Joan":[39.5890,3.0390],
    "Sant Llorenç des Cardassar":[39.6080,3.2850],
    "Son Servera":[39.6200,3.3600],
    "Banyalbufar":[39.6880,2.5000],
    "Escorca":[39.8300,2.8700],
    "Marratxí":[39.6210,2.7260]
  };
}

/* 🔥 veg fix */
function isVeg(text=""){
  return text.toLowerCase().includes("veg") || text.toLowerCase().includes("vegetar");
}

async function load(){
  const { data: res } = await supabase.from('municipios_info').select('*');
  const { data: checklist } = await supabase.from('checklist_mallorca').select('*');

  const visited = new Map();
  (checklist||[]).forEach(x => visited.set(x.municipio, x.visitado));

  data = (res||[]).map(m => ({
    ...m,
    visitado: visited.get(m.municipio) || false
  }));

  renderMap();
  render();
}

/* MAP */
function renderMap(){
  if(!map) initMap();

  const coords = getCoords();

  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};

  data.forEach(m => {
    const c = coords[m.municipio];
    if(!c) return;

    const marker = L.marker(c).addTo(map);

    marker.on("click", () => focusCard(m.municipio));

    marker.bindPopup(m.municipio);

    markers[m.municipio] = marker;
  });
}

/* FOCUS */
window.focusCard = function(name){
  activeMunicipio = name;

  document.querySelectorAll(".card-item").forEach(c => {
    const open = c.dataset.name === name;
    c.classList.toggle("open", open);

    if(open){
      c.scrollIntoView({behavior:"smooth", block:"start"});
    }
  });

  const coords = getCoords()[name];
  if(coords){
    map.setView(coords, 12);
  }
};

/* TOGGLE */
window.toggle = async function(municipio, val){
  await supabase
    .from('checklist_mallorca')
    .update({visitado:val})
    .eq('municipio',municipio);

  load();
};

/* RENDER */
function render(){
  const container = document.getElementById("municipios");
  container.innerHTML="";

  data.forEach(m => {

    const veg = (m.restaurantes||[]).filter(r => isVeg(r));

    const div = document.createElement("div");
    div.className="card-item";
    div.dataset.name=m.municipio;

    div.innerHTML=`
      <div class="title" onclick="focusCard('${m.municipio}')">
        <input type="checkbox"
          ${m.visitado?"checked":""}
          onclick="event.stopPropagation(); toggle('${m.municipio}', this.checked)"
        />
        ${m.municipio}
      </div>

      <div class="desc">${m.descripcion||""}</div>

      <div class="section">
        <b>Lugares</b>
        ${(m.lugares||[]).map(l=>`<div class="badge">📍 ${l}</div>`).join("")}
      </div>

      <div class="section">
        <b>Restaurantes</b>
        ${(m.restaurantes||[]).map(r=>`<div class="badge">🍴 ${r}</div>`).join("")}
      </div>

      <div class="section">
        <b>Vegetarianos</b>
        ${veg.length ? veg.map(v=>`<div class="badge veg">🥗 ${v}</div>`).join("") : "—"}
      </div>
    `;

    container.appendChild(div);
  });
}

window.addEventListener("DOMContentLoaded", async()=>{
  initMap();
  await load();
});
</script>

<style>
body{font-family:system-ui;margin:0;background:#eef2f7;padding:20px;}
.card{max-width:1200px;margin:auto;background:#fff;padding:20px;border-radius:18px;}
#map{height:350px;border-radius:12px;margin:10px 0;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;}

.card-item{
  border:1px solid #eee;
  border-radius:12px;
  padding:10px;
  max-height:60px;
  overflow:hidden;
  transition:.3s;
  cursor:pointer;
}

.card-item.open{
  max-height:900px;
  background:#fff;
}

.title{font-weight:700;display:flex;gap:8px;}
.badge{font-size:12px;background:#f3f6ff;padding:6px;margin:4px 0;border-radius:8px;}
.veg{background:#e7ffe7;}
.desc{font-size:13px;opacity:.7;}

.tag{
  font-size:11px;
  margin-top:10px;
  opacity:.6;
}
</style>
</head>

<body>
<div class="card">
  <h1>🏝️ Mallorca Explorer PRO</h1>
  <div class="tag">For Jasmin & Adri 🌿</div>

  <div id="map"></div>
  <div id="municipios" class="grid"></div>
</div>
</body>
</html>
