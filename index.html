<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reto 53 Municipios de Mallorca</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

.container{
    max-width:1000px;
    margin:auto;
}

h1{
    text-align:center;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

#list{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:10px;
    margin-top:20px;
}

.item{
    background:#fafafa;
    border:1px solid #ddd;
    border-radius:8px;
    padding:10px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.login-btn{
    background:#4285f4;
    color:white;
}

.logout-btn{
    background:#e53935;
    color:white;
}

progress{
    width:100%;
    height:25px;
}

#user{
    margin-bottom:15px;
    font-weight:bold;
}

.hidden{
    display:none;
}
</style>

<script type="module">

import { createClient }
from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
    "https://imizmphocsliukbqvsxe.supabase.co",
    "sb_publishable_kpZt-um8CiK_Wmaxx22-5g_6EwhTRjs"
);

const municipios = [
"Alaró","Alcúdia","Algaida","Andratx","Ariany","Artà",
"Banyalbufar","Binissalem","Búger","Bunyola",
"Calvià","Campanet","Campos","Capdepera","Consell",
"Costitx","Deià","Escorca","Esporles","Estellencs",
"Felanitx","Fornalutx","Inca","Lloret de Vistalegre",
"Lloseta","Llubí","Llucmajor","Manacor",
"Mancor de la Vall","Maria de la Salut","Marratxí",
"Montuïri","Muro","Palma","Petra","Pollença",
"Porreres","Puigpunyent","Sa Pobla","Sant Joan",
"Sant Llorenç des Cardassar","Santa Eugènia",
"Santa Margalida","Santa Maria del Camí","Santanyí",
"Selva","Sencelles","Ses Salines","Sineu","Sóller",
"Son Servera","Valldemossa","Vilafranca de Bonany"
];

let session = null;

window.login = async () => {

    await supabase.auth.signInWithOAuth({
        provider: "google",
        options: {
            redirectTo: window.location.origin
        }
    });

};

window.logout = async () => {

    await supabase.auth.signOut();
    location.reload();

};

async function loadSession(){

    const {
        data: { session: currentSession }
    } = await supabase.auth.getSession();

    session = currentSession;

    if(!session){

        document
            .getElementById("loginView")
            .classList.remove("hidden");

        document
            .getElementById("appView")
            .classList.add("hidden");

        return;
    }

    document
        .getElementById("loginView")
        .classList.add("hidden");

    document
        .getElementById("appView")
        .classList.remove("hidden");

    document.getElementById("user")
        .textContent =
        session.user.email;

    await loadMunicipios();
}

async function loadMunicipios(){

    const { data, error } = await supabase
        .from("municipios_visitados")
        .select("*");

    if(error){
        console.error(error);
        return;
    }

    const visitados = {};

    data.forEach(row => {
        visitados[row.municipio] = row.visitado;
    });

    renderMunicipios(visitados);
}

function renderMunicipios(visitados){

    const list =
        document.getElementById("list");

    list.innerHTML = "";

    let completados = 0;

    municipios.forEach(nombre => {

        const checked =
            visitados[nombre] === true;

        if(checked){
            completados++;
        }

        const div =
            document.createElement("div");

        div.className = "item";

        div.innerHTML = `
            <label>
                <input
                    type="checkbox"
                    data-name="${nombre}"
                    ${checked ? "checked" : ""}
                >
                ${nombre}
            </label>
        `;

        list.appendChild(div);

    });

    updateProgress(completados);

    document
        .querySelectorAll("input[type='checkbox']")
        .forEach(cb => {

            cb.addEventListener(
                "change",
                saveMunicipio
            );

        });
}

function updateProgress(total){

    document.getElementById("count")
        .textContent =
        `${total}/53 completados`;

    document.getElementById("progress")
        .value = total;
}

async function saveMunicipio(event){

    const municipio =
        event.target.dataset.name;

    const visitado =
        event.target.checked;

    const { error } = await supabase
        .from("municipios_visitados")
        .upsert({
            user_id: session.user.id,
            municipio,
            visitado
        });

    if(error){
        console.error(error);
        alert(error.message);
        return;
    }

    const total =
        document.querySelectorAll(
            "input[type='checkbox']:checked"
        ).length;

    updateProgress(total);
}

window.addEventListener(
    "DOMContentLoaded",
    async () => {

        await loadSession();

        supabase.auth.onAuthStateChange(
            async () => {

                await loadSession();

            }
        );

    }
);

</script>

</head>

<body>

<div class="container">

    <div id="loginView" class="card">

        <h1>🏝️ Reto 53 Municipios de Mallorca</h1>

        <p>
            Inicia sesión con Google para guardar
            tu progreso en la nube.
        </p>

        <button
            class="login-btn"
            onclick="login()">
            Entrar con Google
        </button>

    </div>

    <div id="appView" class="card hidden">

        <h1>🏝️ Reto 53 Municipios de Mallorca</h1>

        <div id="user"></div>

        <button
            class="logout-btn"
            onclick="logout()">
            Cerrar sesión
        </button>

        <br><br>

        <div id="count">
            0/53 completados
        </div>

        <br>

        <progress
            id="progress"
            value="0"
            max="53">
        </progress>

        <div id="list"></div>

    </div>

</div>

</body>
</html>
