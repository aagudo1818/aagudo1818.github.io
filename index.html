<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mallorca Municipalities Challenge for Jasmin & Adri</title>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
  'https://imizmphocsliukbqvsxe.supabase.co',
  'sb_publishable_kpZt-um8CiK_Wmaxx22-5g_6EwhTRjs'
);

async function loadData() {
  const status = document.getElementById('status');

  try {
    const { data, error } = await supabase
      .from('checklist_mallorca')
      .select('*');

    if (error) {
      status.textContent = 'Supabase error: ' + error.message;
      console.error(error);
      return;
    }

    if (!data || data.length === 0) {
      status.textContent =
        'No municipalities found in checklist_mallorca table.';
      return;
    }

    render(data);
    status.textContent = 'Connected ✓';
  } catch (err) {
    status.textContent = err.message;
    console.error(err);
  }
}

function render(rows) {
  const container = document.getElementById('municipios');
  container.innerHTML = '';

  let completed = 0;

  rows.forEach(row => {
    if (row.visitado) completed++;

    const div = document.createElement('div');
    div.className = 'item';

    div.innerHTML = `
      <label>
        <input
          type="checkbox"
          data-name="${row.municipio}"
          ${row.visitado ? 'checked' : ''}
        >
        ${row.municipio}
      </label>
    `;

    container.appendChild(div);
  });

  updateProgress(completed);

  document.querySelectorAll('input[type="checkbox"]')
    .forEach(cb => cb.addEventListener('change', save));
}

function updateProgress(total) {
  document.getElementById('counter').textContent =
    `${total}/53 municipalities visited`;

  document.getElementById('progress').value = total;
}

async function save(e) {
  const municipio = e.target.dataset.name;
  const visitado = e.target.checked;

  const { error } = await supabase
    .from('checklist_mallorca')
    .update({ visitado })
    .eq('municipio', municipio);

  if (error) {
    alert(error.message);
    console.error(error);
    return;
  }

  updateProgress(
    document.querySelectorAll(
      'input[type="checkbox"]:checked'
    ).length
  );
}

window.addEventListener('DOMContentLoaded', loadData);
</script>

<style>
body{
  font-family:Arial,sans-serif;
  max-width:1000px;
  margin:auto;
  padding:20px;
  background:#f5f5f5;
}
.card{
  background:white;
  padding:20px;
  border-radius:12px;
}
#municipios{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:10px;
}
.item{
  border:1px solid #ddd;
  padding:10px;
  border-radius:8px;
}
progress{
  width:100%;
  height:24px;
}
</style>
</head>

<body>
<div class="card">
  <h1>🏝️ Mallorca Municipalities Challenge</h1>
  <p>For Jasmin & Adri ❤️</p>

  <div id="counter">0/53 municipalities visited</div>
  <progress id="progress" max="53" value="0"></progress>

  <br><br>

  <div id="municipios"></div>

  <br>

  <div id="status">Loading...</div>
</div>
</body>
</html>
