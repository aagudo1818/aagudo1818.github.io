<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mallorca Municipalities Challenge for Jasmin & Adri</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 20px;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
}

.container {
    max-width: 1000px;
    margin: auto;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
    margin-bottom: 10px;
}

.subtitle {
    text-align: center;
    color: #666;
    margin-bottom: 25px;
}

#counter {
    font-size: 1.2rem;
    margin-bottom: 10px;
    text-align: center;
    font-weight: bold;
}

progress {
    width: 100%;
    height: 25px;
}

#municipios {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px,1fr));
    gap: 10px;
    margin-top: 25px;
}

.item {
    background: #fafafa;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 10px;
}

label {
    cursor: pointer;
    display: block;
}

.status {
    text-align: center;
    margin-top: 15px;
    color: #666;
}
</style>

<script type="module">

import { createClient }
from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
    'https://imizmphocsliukbqvsxe.supabase.co',
    'sb_publishable_kpZt-um8CiK_Wmaxx22-5g_6EwhTRjs'
);

async function loadMunicipios() {

    const { data, error } = await supabase
        .from('checklist_mallorca')
        .select('*')
        .order('municipio');

    if(error) {
        console.error(error);
        document.getElementById("status").textContent =
            "Database error: " + error.message;
        return;
    }

    render(data);
}

function render(data) {

    const container =
        document.getElementById('municipios');

    container.innerHTML = '';

    let completed = 0;

    data.forEach(row => {

        if(row.visitado) completed++;

        const div = document.createElement('div');

        div.className = 'item';

        div.innerHTML = `
            <label>
                <input
                    type="checkbox"
                    data-name="${row.municipio}"
                    ${row.visitado ? 'checked' : ''}
                >
                ${row.municipio}
            </label>
        `;

        container.appendChild(div);
    });

    updateProgress(completed);

    document
        .querySelectorAll('input[type="checkbox"]')
        .forEach(cb => {

            cb.addEventListener(
                'change',
                updateMunicipio
            );

        });

    document.getElementById("status")
        .textContent = "Connected to Supabase";
}

function updateProgress(completed) {

    document.getElementById('counter')
        .textContent =
        `${completed}/53 municipalities visited`;

    document.getElementById('progress')
        .value = completed;
}

async function updateMunicipio(event) {

    const municipio =
        event.target.dataset.name;

    const checked =
        event.target.checked;

    const { error } = await supabase
        .from('checklist_mallorca')
        .update({
            visitado: checked
        })
        .eq('municipio', municipio);

    if(error) {
        alert(error.message);
        console.error(error);
        return;
    }

    const total =
        document.querySelectorAll(
            'input[type="checkbox"]:checked'
        ).length;

    updateProgress(total);
}

window.addEventListener(
    'DOMContentLoaded',
    loadMunicipios
);

</script>

</head>

<body>

<div class="container">

    <div class="card">

        <h1>
            🏝️ Mallorca Municipalities Challenge
        </h1>

        <div class="subtitle">
            For Jasmin & Adri ❤️
        </div>

        <div id="counter">
            0/53 municipalities visited
        </div>

        <progress
            id="progress"
            value="0"
            max="53">
        </progress>

        <div id="municipios"></div>

        <div
            id="status"
            class="status">
            Connecting...
        </div>

    </div>

</div>

</body>
</html>
