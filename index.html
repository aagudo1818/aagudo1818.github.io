<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mallorca Explorer PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
  'https://imizmphocsliukbqvsxe.supabase.co',
  'sb_publishable_kpZt-um8CiK_Wmaxx22-5g_6EwhTRjs'
);

let data = [];
let map;
let markers = [];
let active = null;

/* ---------------- MAP ---------------- */
function initMap() {
  map = L.map('map').setView([39.6, 2.9], 9);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);
}

/* ---------------- COORDS (53 COMPLETO) ---------------- */

    "Sóller":[39.7654,2.7140],
    "Alcúdia":[39.8420,3.1249],
    "Pollença":[39.8770,3.0163],
    "Inca":[39.7189,2.9156],
    "Manacor":[39.5699,3.2096],
    "Calvià":[39.5655,2.5040],
    "Andratx":[39.5753,2.4201],
    "Santanyí":[39.3555,3.1299],
    "Artà":[39.6926,3.3497],
    "Capdepera":[39.7031,3.4348],
    "Felanitx":[39.4687,3.1485],
    "Llucmajor":[39.4850,2.8940],
    "Muro":[39.7356,3.0551],
    "Sa Pobla":[39.7693,3.0236],
    "Sineu":[39.6429,3.0106],

    "Esporles":[39.6670,2.5785],
    "Estellencs":[39.6532,2.4815],

    "Porreres":[39.5144,3.0224],
    "Selva":[39.7564,2.8980],
    "Sencelles":[39.6456,2.9035],
    "Ses Salines":[39.3386,3.0528],
    "Valldemossa":[39.7119,2.6222],
    "Vilafranca de Bonany":[39.5683,3.0884],

    "Sant Joan":[39.6206,3.0344],
    "Sant Llorenç des Cardassar":[39.6104,3.2837],
    "Ariany":[39.6500,3.1100]
  };
}

/* ---------------- SAFE VEG ---------------- */
function isVeg(r){
  if(!r) return false;
  if(typeof r.veg === "boolean") return r.veg;
  if(typeof r.veg === "string") return r.veg.toLowerCase() === "true";
  return false;
}

/* ---------------- LOAD ---------------- */
async function load(){
  const { data: res } = await supabase.from('municipios_info').select('*');
  const { data: check } = await supabase.from('checklist_mallorca').select('*');

  const mapVisited = new Map();
  (check || []).forEach(x => mapVisited.set(x.municipio, x.visitado));

  data = (res || []).map(m => ({
    ...m,
    visitado: mapVisited.get(m.municipio) || false
  })).sort((a,b)=>a.municipio.localeCompare(b.municipio));

  renderMap();
  render();
}

/* ---------------- MAP ---------------- */
function renderMap(){
  if(!map) initMap();

  const coords = getCoords();

  markers.forEach(m=>map.removeLayer(m));
  markers = [];

  data.forEach(m=>{
    const c = coords[m.municipio];
    if(!c) return;

    const marker = L.marker(c).addTo(map);

    marker.on("click", ()=>focus(m.municipio));

    markers.push(marker);
  });
}

/* ---------------- FOCUS ---------------- */
window.focus = function(name){
  active = name;
  render();

  const el = document.getElementById("card-"+name);
  if(el){
    el.scrollIntoView({behavior:"smooth",block:"start"});
  }
};

/* ---------------- RENDER ---------------- */
function render(){
  const box = document.getElementById("list");
  box.innerHTML = "";

  data.forEach(m=>{
    const open = active === m.municipio;

    const restaurantes = Array.isArray(m.restaurantes) ? m.restaurantes : [];
    const veg = restaurantes.filter(isVeg);

    const div = document.createElement("div");
    div.className = "card";

    div.id = "card-"+m.municipio;

    div.innerHTML = `
      <div class="title" onclick="focus('${m.municipio}')">
        <input type="checkbox"
          ${m.visitado ? "checked":""}
          onclick="event.stopPropagation()"
          onchange="toggle('${m.municipio}', this.checked)"
        />
        ${m.municipio}
      </div>

      <div class="content ${open ? "open":"closed"}">

        <div class="desc">${m.descripcion || ""}</div>

        <h4>🍽 Restaurantes</h4>
        ${restaurantes.map(r=>`
          <div class="item">🍴 ${r.nombre || r} ⭐ ${r.rating ?? "-"}</div>
        `).join("")}

        <h4>🌱 Vegetarianos</h4>
        ${veg.length ? veg.map(v=>`
          <div class="item veg">🥗 ${v.nombre || v} ⭐ ${v.rating ?? "-"}</div>
        `).join("") : "No hay"}

      </div>
    `;

    box.appendChild(div);
  });

  update();
}

/* ---------------- COUNTER ---------------- */
function update(){
  const done = data.filter(x=>x.visitado).length;
  document.getElementById("counter").textContent =
    `${done}/${data.length} municipios`;
}

/* ---------------- TOGGLE ---------------- */
window.toggle = async function(m,v){
  await supabase.from("checklist_mallorca")
    .update({visitado:v})
    .eq("municipio",m);

  load();
};

window.addEventListener("DOMContentLoaded", ()=>{
  initMap();
  load();
});
</script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#eef2f7;
  padding:20px;
}

#map{
  height:320px;
  border-radius:12px;
  margin:15px 0;
}

  background:white;
  margin-bottom:10px;
  border-radius:12px;
  overflow:hidden;
  border:1px solid #eee;
}

.title{
  padding:10px;
  font-weight:700;
  display:flex;
  gap:10px;
  cursor:pointer;
}

.content{
  padding:10px;
}

.closed{ display:none; }

.item{
  font-size:12px;
  padding:4px 0;
}

.veg{ background:#e7ffe7; }

.desc{ opacity:.7; font-size:13px; }

h4{ margin:10px 0 5px; }

#counter{ font-weight:700; margin-bottom:10px; }
</style>

</head>

<body>

<h1>🏝 Mallorca Explorer PRO</h1>
<div id="counter"></div>

<div id="map"></div>
<div id="list"></div>

</body>
</html>
