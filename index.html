<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mallorca Explorer PRO</title>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
  'https://imizmphocsliukbqvsxe.supabase.co',
  'sb_publishable_kpZt-um8CiK_Wmaxx22-5g_6EwhTRjs'
);

let data = [];
let filter = "all";

/* ---------------- LOAD DATA ---------------- */
async function load() {
  const status = document.getElementById("status");

  try {
    const { data: res, error } = await supabase
      .from('municipios_info')
      .select('*');

    const { data: checklist } = await supabase
      .from('checklist_mallorca')
      .select('*');

    if (error) throw error;

    const visitedMap = new Map();
    (checklist || []).forEach(x => {
      visitedMap.set(x.municipio, x.visitado);
    });

    data = (res || [])
      .map(m => ({
        ...m,
        visitado: visitedMap.get(m.municipio) || false
      }))
      .sort((a,b)=> a.municipio.localeCompare(b.municipio));

    render();
    status.textContent = "Connected ✓";

  } catch (err) {
    status.textContent = err.message;
  }
}

/* ---------------- FILTER ---------------- */
function getFiltered() {
  if (filter === "visited") return data.filter(x => x.visitado);
  if (filter === "pending") return data.filter(x => !x.visitado);
  return data;
}

/* ---------------- RENDER ---------------- */
function render() {
  const container = document.getElementById("municipios");
  container.innerHTML = "";

  const rows = getFiltered();

  rows.forEach(item => {

    const lugares = Array.isArray(item.lugares) ? item.lugares : [];
    const restaurantes = Array.isArray(item.restaurantes) ? item.restaurantes : [];

    const veg = restaurantes.filter(r => r.veg === true);

    const div = document.createElement("div");
    div.className = "card-item";

    div.innerHTML = `
      <div class="title">
        <input type="checkbox"
          ${item.visitado ? "checked" : ""}
          onchange="toggle(\`${item.municipio}\`, this.checked)"
        />
        ${item.municipio}
      </div>

      <div class="desc">${item.descripcion || "Sin descripción"}</div>

      <div class="section">
        <h4>📍 Lugares</h4>
        ${
          lugares.length
            ? lugares
                .sort((a,b)=> (a.nombre||"").localeCompare(b.nombre||""))
                .map(l => `
                  <div class="badge">
                    📌 ${l.nombre || l} — ${l.descripcion || ""}
                  </div>
                `).join("")
            : "Sin datos"
        }
      </div>

      <div class="section">
        <h4>🍽️ Restaurantes top</h4>
        ${
          restaurantes.length
            ? restaurantes
                .sort((a,b)=> (b.rating||0)-(a.rating||0))
                .slice(0,5)
                .map(r => `
                  <div class="badge">
                    🍴 ${r.nombre} ⭐ ${r.rating ?? "-"}
                  </div>
                `).join("")
            : "Sin datos"
        }
      </div>

      <div class="section">
        <h4>🌱 Vegetarianos</h4>
        ${
          veg.length
            ? veg.map(v => `
                <div class="badge veg">
                  🥗 ${v.nombre} ⭐ ${v.rating ?? "-"}
                </div>
              `).join("")
            : "No hay opciones vegetarianas"
        }
      </div>
    `;

    container.appendChild(div);
  });

  updateCounter();
}

/* ---------------- COUNTER ---------------- */
function updateCounter() {
  const done = data.filter(x => x.visitado).length;

  document.getElementById("counter").textContent =
    `${done}/${data.length} municipios visitados`;

  document.getElementById("progress").max = data.length || 1;
  document.getElementById("progress").value = done;
}

/* ---------------- TOGGLE ---------------- */
window.toggle = async function(municipio, value){

  await supabase
    .from('checklist_mallorca')
    .update({ visitado: value })
    .eq('municipio', municipio);

  load();
};

/* ---------------- FILTER BUTTONS ---------------- */
window.setFilter = (f) => {
  filter = f;
  render();
};

/* ---------------- INIT ---------------- */
window.addEventListener("DOMContentLoaded", load);
</script>

<style>
body{
  margin:0;
  font-family: system-ui, Arial;
  background: linear-gradient(135deg,#eef2f7,#dfe9f3);
  padding:30px;
}

.card{
  max-width:1100px;
  margin:auto;
  background:#fff;
  border-radius:18px;
  padding:25px;
  box-shadow:0 12px 30px rgba(0,0,0,.08);
}

h1{ margin:0; }

.sub{
  opacity:.7;
  margin-bottom:10px;
}

progress{
  width:100%;
  height:16px;
  border-radius:10px;
}

.tabs{
  display:flex;
  gap:10px;
  margin:15px 0;
}

.tabs button{
  border:none;
  padding:8px 14px;
  border-radius:12px;
  cursor:pointer;
  background:#eee;
  font-weight:600;
}

.tabs button:hover{
  background:#ddd;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:15px;
  margin-top:15px;
}

.card-item{
  border:1px solid #eee;
  border-radius:14px;
  padding:15px;
  background:white;
  transition:.2s;
}

.card-item:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 20px rgba(0,0,0,.08);
}

.title{
  font-weight:700;
  display:flex;
  gap:10px;
  align-items:center;
}

.desc{
  font-size:13px;
  opacity:.8;
  margin-top:5px;
}

.section{
  margin-top:10px;
}

.badge{
  display:block;
  padding:6px 8px;
  margin:4px 0;
  border-radius:10px;
  background:#f3f6ff;
  font-size:12px;
}

.veg{
  background:#e7ffe7;
}

h4{
  margin:10px 0 5px;
  font-size:13px;
}

#counter{
  margin:10px 0;
  font-weight:600;
}

#status{
  margin-top:15px;
  font-size:12px;
  opacity:.6;
}
</style>
</head>

<body>
<div class="card">
  <h1>🏝️ Mallorca Explorer PRO</h1>
  <div class="sub">Jasmin & Adri ❤️</div>

  <div id="counter"></div>
  <progress id="progress" max="53" value="0"></progress>

  <div class="tabs">
    <button onclick="setFilter('all')">Todos</button>
    <button onclick="setFilter('visited')">Visitados</button>
    <button onclick="setFilter('pending')">Por visitar</button>
  </div>

  <div id="municipios" class="grid"></div>

  <div id="status">Loading...</div>
</div>
</body>
</html>
